<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bids · Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* ═══════════════════════════════════════════════════════════════
           THEME VARIABLES (copied to match dynamic_dashboard.html)
           ═══════════════════════════════════════════════════════════════ */
        :root {
            --glass-bg: rgba(15, 23, 42, 0.9);
            --glass-bg-light: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-hover: rgba(255, 255, 255, 0.18);
            --text-primary: #f8fafc;
            --text-secondary: rgba(248, 250, 252, 0.75);
            --text-muted: rgba(248, 250, 252, 0.55);
            --accent-gradient: linear-gradient(135deg, #0f2a5e 0%, #1e4d8c 50%, #60a5fa 100%);
            --accent-blue: #60a5fa;
            --accent-purple: #3b82f6;
            --pill-bg: rgba(255, 255, 255, 0.08);
            --pill-hover: rgba(255, 255, 255, 0.14);
            --input-bg: rgba(15, 23, 42, 0.95);
            --blur-amount: 20px;
            --body-bg: #0f172a;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        [data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-bg-light: rgba(248, 250, 252, 0.9);
            --glass-border: rgba(0, 0, 0, 0.1);
            --glass-border-hover: rgba(0, 0, 0, 0.18);
            --text-primary: #1e293b;
            --text-secondary: rgba(30, 41, 59, 0.8);
            --text-muted: rgba(30, 41, 59, 0.55);
            --pill-bg: rgba(0, 0, 0, 0.05);
            --pill-hover: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.95);
            --body-bg: #f1f5f9;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --info: #2563eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--body-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Background Layer */
        .background-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url('{{ url_for("static", filename="images/faite-bg-v2.png") }}') center/cover no-repeat fixed;
            filter: brightness(0.5) saturate(1.1);
        }
        [data-theme="light"] .background-layer { filter: brightness(1.1) saturate(0.9); }

        .background-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(
                180deg,
                rgba(15, 23, 42, 0.7) 0%,
                rgba(15, 23, 42, 0.85) 50%,
                rgba(15, 23, 42, 0.92) 100%
            );
        }
        [data-theme="light"] .background-overlay {
            background: linear-gradient(
                180deg,
                rgba(241, 245, 249, 0.7) 0%,
                rgba(241, 245, 249, 0.85) 50%,
                rgba(241, 245, 249, 0.95) 100%
            );
        }

        .page {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top nav */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .nav-left { display: flex; align-items: center; gap: 12px; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon {
            width: 32px; height: 32px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-weight: 700;
            font-family: "JetBrains Mono", monospace;
            font-size: 14px;
        }
        .brand-name { font-weight: 600; font-size: 18px; letter-spacing: -0.3px; }
        .nav-center { font-size: 14px; color: var(--text-secondary); }
        .nav-right { display: flex; align-items: center; gap: 8px; }

        .nav-btn {
            padding: 8px 16px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            user-select: none;
            text-decoration: none;
        }
        .nav-btn:hover {
            background: var(--pill-hover);
            border-color: var(--glass-border-hover);
        }

        .theme-toggle-btn {
            width: 40px; height: 40px;
            border: none;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .theme-toggle-btn:hover { background: var(--pill-hover); }

        /* Main content */
        .container {
            max-width: 1400px;
            width: 100%;
            margin: 18px auto 40px;
            padding: 0 18px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 8px 32px var(--shadow-color);
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .pill {
            padding: 6px 12px;
            background: var(--pill-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }

        .stat-card {
            background: var(--glass-bg-light);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
            font-family: "JetBrains Mono", monospace;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1;
        }

        .filter-select, .filter-input {
            padding: 8px 12px;
            background: var(--pill-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 12px;
            outline: none;
            min-width: 140px;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: var(--glass-bg-light);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
            font-size: 13px;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            background: rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tr:hover td {
            background: var(--pill-hover);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-success { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-warning { background: rgba(245, 158, 11, 0.2); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-danger { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-info { background: rgba(59, 130, 246, 0.2); color: var(--info); border: 1px solid rgba(59, 130, 246, 0.3); }

        .score-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            background: var(--pill-bg);
            border: 1px solid var(--glass-border);
        }

        .action-buttons {
            display: flex;
            gap: 6px;
        }

        .btn-icon {
            padding: 6px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-icon:hover {
            background: var(--pill-hover);
            border-color: var(--glass-border-hover);
        }

        .notification {
            position: fixed;
            right: 18px;
            bottom: 18px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 14px;
            box-shadow: 0 8px 32px var(--shadow-color);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            display: none;
            max-width: 380px;
            z-index: 50;
        }
    </style>
</head>
<html>
    
    <body class="page">
    <!-- Top Navigation -->
    <div class="top-nav">
        <div class="nav-left">
            <div class="brand">
                <div class="brand-icon">B</div>
                <span class="brand-name">Bid Evaluator</span>
            </div>
            <div class="nav-center">
                <i class="bi bi-files"></i> All Bids · Admin Review
            </div>
        </div>
        <div class="nav-right">
            <a href="{{ url_for('admin.dashboard') }}" class="nav-btn">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="{{ url_for('admin.rfq_list') }}" class="nav-btn">
                <i class="bi bi-list-ul"></i> RFQs
            </a>
            <button class="theme-toggle-btn" onclick="toggleTheme()">
                <i class="bi bi-sun-fill" id="light-icon" style="display: none;"></i>
                <i class="bi bi-moon-fill" id="dark-icon"></i>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalRfqs">0</div>
                <div class="stat-label">Total RFQs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalBids">0</div>
                <div class="stat-label">Total Bids</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgBidsPerRfq">0</div>
                <div class="stat-label">Avg Bids/RFX</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingRfqs">0</div>
                <div class="stat-label">Pending Review</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="glass-card">
            <div class="filter-bar">
                <div class="filter-group">
                    <select id="statusFilter" class="filter-select">
                        <option value="">All Status</option>
                        <option value="DRAFT">Draft</option>
                        <option value="PUBLISHED">Published</option>
                        <option value="PROCESSING">Processing</option>
                        <option value="CLOSED">Closed</option>
                        <option value="COMPLETED">Awarded/Completed</option>
                        <option value="CANCELLED">Cancelled</option>
                    </select>
                    <select id="bidStatusFilter" class="filter-select">
                        <option value="">Any Bids</option>
                        <option value="has_bids">Has Bids</option>
                        <option value="no_bids">No Bids Yet</option>
                    </select>
                </div>
                <div class="filter-group">
                    <input type="text" id="searchInput" class="filter-input" placeholder="Search RFQ ID or Department..." style="flex: 1;">
                    <button class="nav-btn" onclick="refreshData()">
                        <i class="bi bi-arrow-repeat"></i> Refresh
                    </button>
                </div>
            </div>
        </div>

        <!-- RFQs Table -->
        <div class="glass-card" style="padding: 0; overflow: hidden;">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>RFQ ID</th>
                            <th>Department</th>
                            <th>Created</th>
                            <th>Budget</th>
                            <th>Bids Received</th>
                            <th>Avg Score</th>
                            <th>Lowest Bid</th>
                            <th>Highest Bid</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="rfqsTableBody">
                        <tr>
                            <td colspan="10" style="text-align: center; padding: 40px;">
                                <div class="spinner-border" style="width: 2rem; height: 2rem;" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-2">Loading RFQs...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification">
        <strong id="notifTitle"></strong>
        <p id="notifMessage"></p>
    </div>

    <script>
        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcons(newTheme);
        }

        function updateThemeIcons(theme) {
            const lightIcon = document.getElementById('light-icon');
            const darkIcon = document.getElementById('dark-icon');
            if (theme === 'dark') {
                lightIcon.style.display = 'none';
                darkIcon.style.display = 'inline-block';
            } else {
                lightIcon.style.display = 'inline-block';
                darkIcon.style.display = 'none';
            }
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcons(savedTheme);

        // Show notification
        function showNotification(title, message, isError = false) {
            const notif = document.getElementById('notification');
            const titleEl = document.getElementById('notifTitle');
            const msgEl = document.getElementById('notifMessage');
            
            titleEl.textContent = title;
            msgEl.textContent = message;
            titleEl.style.color = isError ? 'var(--danger)' : 'var(--success)';
            
            notif.style.display = 'block';
            setTimeout(() => { notif.style.display = 'none'; }, 5000);
        }

        // Store RFQs data for filtering
        let allRfqs = [];

        // Load RFQs
        async function loadRFQs() {
            try {
                const response = await fetch('/RFX/admin/api/rfqs');
                const data = await response.json();
                
                if (data.status === 'success') {
                    allRfqs = data.rfqs;
                    displayRFQs(allRfqs);
                    updateStats(allRfqs);
                } else {
                    showNotification('Error', data.message || 'Failed to load RFQs', true);
                }
            } catch (error) {
                console.error('Error loading RFQs:', error);
                showNotification('Error', 'Failed to load RFQs', true);
                document.getElementById('rfqsTableBody').innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 40px; color: var(--danger);">
                            <i class="bi bi-exclamation-triangle" style="font-size: 24px;"></i>
                            <p>Error loading RFQs. Please try again.</p>
                            <button class="nav-btn" onclick="loadRFQs()" style="margin-top: 10px;">
                                <i class="bi bi-arrow-repeat"></i> Retry
                            </button>
                        </td>
                    </tr>
                `;
            }
        }

        // Update statistics
        function updateStats(rfqs) {
            const totalRfqs = rfqs.length;
            const totalBids = rfqs.reduce((sum, rfq) => sum + (rfq.bids_received || 0), 0);
            const avgBidsPerRfq = totalRfqs > 0 ? (totalBids / totalRfqs).toFixed(1) : 0;
            const pendingRfqs = rfqs.filter(rfq => 
                rfq.status === 'PUBLISHED' || rfq.status === 'PROCESSING'
            ).length;

            document.getElementById('totalRfqs').textContent = totalRfqs;
            document.getElementById('totalBids').textContent = totalBids;
            document.getElementById('avgBidsPerRfq').textContent = avgBidsPerRfq;
            document.getElementById('pendingRfqs').textContent = pendingRfqs;
        }

        // Display RFQs in table
        function displayRFQs(rfqs) {
            const tbody = document.getElementById('rfqsTableBody');
            
            if (rfqs.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 40px; color: var(--text-muted);">
                            <i class="bi bi-inbox" style="font-size: 24px; display: block; margin-bottom: 10px;"></i>
                            No RFQs found
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = rfqs.map(rfq => {
                // Format dates
                const createdDate = rfq.created_at ? new Date(rfq.created_at).toLocaleDateString() : '—';
                
                // Determine status badge class - Using COMPLETED for awarded RFQs
                const statusClass = 
                    rfq.status === 'PUBLISHED' ? 'badge-info' : 
                    rfq.status === 'PROCESSING' ? 'badge-warning' :
                    rfq.status === 'CLOSED' ? 'badge-secondary' : 
                    rfq.status === 'COMPLETED' ? 'badge-success' : 
                    rfq.status === 'CANCELLED' ? 'badge-danger' : 'badge-secondary';

                // Format status display - Show "AWARDED" for COMPLETED status
                const statusDisplay = rfq.status === 'COMPLETED' ? 'AWARDED' : rfq.status || 'DRAFT';

                return `
                    <tr>
                        <td><span class="pill">${rfq.rfq_id}</span></td>
                        <td>${rfq.department || '—'}</td>
                        <td class="muted">${createdDate}</td>
                        <td class="mono">${rfq.currency || 'USD'} ${(rfq.total_budget || 0).toLocaleString()}</td>
                        <td>
                            <span class="badge ${rfq.bids_received > 0 ? 'badge-success' : 'badge-warning'}">
                                ${rfq.bids_received || 0}/${rfq.total_suppliers || 0}
                            </span>
                        </td>
                        <td class="mono">${rfq.avg_match_score ? rfq.avg_match_score.toFixed(1) : '—'}</td>
                        <td class="mono">${rfq.lowest_bid ? rfq.currency + ' ' + rfq.lowest_bid.toLocaleString() : '—'}</td>
                        <td class="mono">${rfq.highest_bid ? rfq.currency + ' ' + rfq.highest_bid.toLocaleString() : '—'}</td>
                        <td>
                            <span class="badge ${statusClass}">
                                ${statusDisplay}
                            </span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <a href="/RFX/admin/rfq/${rfq.rfq_id}" class="btn-icon" title="View Bids">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a href="/RFX/admin/rfq/${rfq.rfq_id}/evaluation" class="btn-icon" title="Evaluate Bids">
                                    <i class="bi bi-graph-up"></i>
                                </a>
                                ${rfq.bids_received > 0 ? `
                                <a href="/RFX/admin/rfq/${rfq.rfq_id}/evaluation" class="btn-icon" title="Compare Bids">
                                    <i class="bi bi-bar-chart"></i>
                                </a>
                                ` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Filter RFQs
        function filterRFQs() {
            const statusFilter = document.getElementById('statusFilter').value;
            const bidStatusFilter = document.getElementById('bidStatusFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            const filtered = allRfqs.filter(rfq => {
                // Status filter
                if (statusFilter && rfq.status !== statusFilter) return false;
                
                // Bid status filter
                if (bidStatusFilter === 'has_bids' && (rfq.bids_received || 0) === 0) return false;
                if (bidStatusFilter === 'no_bids' && (rfq.bids_received || 0) > 0) return false;
                
                // Search filter
                if (searchTerm) {
                    const matchesId = rfq.rfq_id.toLowerCase().includes(searchTerm);
                    const matchesDept = (rfq.department || '').toLowerCase().includes(searchTerm);
                    if (!matchesId && !matchesDept) return false;
                }
                
                return true;
            });

            displayRFQs(filtered);
            updateStats(filtered);
        }

        // Refresh data
        async function refreshData() {
            showNotification('Refreshing', 'Loading latest RFQ data...');
            await loadRFQs();
            showNotification('Success', 'Data refreshed successfully');
        }

        // Event listeners for filters
        document.getElementById('statusFilter').addEventListener('change', filterRFQs);
        document.getElementById('bidStatusFilter').addEventListener('change', filterRFQs);
        document.getElementById('searchInput').addEventListener('input', filterRFQs);

        // Initialize
        document.addEventListener('DOMContentLoaded', loadRFQs);
    </script>
</body>
</html>
