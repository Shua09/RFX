<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ═══════════════════════════════════════════════════════════════
           THEME VARIABLES
           ═══════════════════════════════════════════════════════════════ */
        :root {
            --glass-bg: rgba(15, 23, 42, 0.9);
            --glass-bg-light: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-hover: rgba(255, 255, 255, 0.18);
            --text-primary: #f8fafc;
            --text-secondary: rgba(248, 250, 252, 0.75);
            --text-muted: rgba(248, 250, 252, 0.55);
            --accent-gradient: linear-gradient(135deg, #0f2a5e 0%, #1e4d8c 50%, #60a5fa 100%);
            --accent-blue: #60a5fa;
            --accent-purple: #3b82f6;
            --pill-bg: rgba(255, 255, 255, 0.08);
            --pill-hover: rgba(255, 255, 255, 0.14);
            --input-bg: rgba(15, 23, 42, 0.95);
            --blur-amount: 20px;
            --body-bg: #0f172a;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        [data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-bg-light: rgba(248, 250, 252, 0.9);
            --glass-border: rgba(0, 0, 0, 0.1);
            --glass-border-hover: rgba(0, 0, 0, 0.18);
            --text-primary: #1e293b;
            --text-secondary: rgba(30, 41, 59, 0.8);
            --text-muted: rgba(30, 41, 59, 0.55);
            --pill-bg: rgba(0, 0, 0, 0.05);
            --pill-hover: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.95);
            --body-bg: #f1f5f9;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --info: #2563eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--body-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .background-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url('{{ url_for("static", filename="images/faite-bg-v2.png") }}') center/cover no-repeat fixed;
            filter: brightness(0.5) saturate(1.1);
        }
        [data-theme="light"] .background-layer { filter: brightness(1.1) saturate(0.9); }

        .background-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(
                180deg,
                rgba(15, 23, 42, 0.7) 0%,
                rgba(15, 23, 42, 0.85) 50%,
                rgba(15, 23, 42, 0.92) 100%
            );
        }
        [data-theme="light"] .background-overlay {
            background: linear-gradient(
                180deg,
                rgba(241, 245, 249, 0.7) 0%,
                rgba(241, 245, 249, 0.85) 50%,
                rgba(241, 245, 249, 0.95) 100%
            );
        }

        .page {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top nav */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .nav-left { display: flex; align-items: center; gap: 12px; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon {
            width: 32px; height: 32px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: #fff;
        }
        .brand-name { font-size: 15px; font-weight: 600; }
        .nav-center {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-right { display: flex; align-items: center; gap: 8px; }

        .nav-btn {
            padding: 8px 14px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 10px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .nav-btn:hover {
            background: var(--pill-hover);
            color: var(--text-primary);
            border-color: var(--glass-border-hover);
        }

        .theme-toggle-btn {
            width: 36px; height: 36px;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-primary);
            cursor: pointer; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s ease;
        }
        .theme-toggle-btn:hover { background: var(--pill-hover); }

        /* Container */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        /* Glass card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 8px 32px var(--shadow-color);
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .card-title i { color: var(--accent-blue); }

        .pill {
            padding: 6px 12px;
            background: var(--pill-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .muted { color: var(--text-muted); font-size: 13px; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 18px;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            box-shadow: 0 4px 16px var(--shadow-color);
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .stat-card:hover {
            border-color: var(--glass-border-hover);
            transform: translateY(-2px);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 18px;
        }
        .stat-icon.blue { background: rgba(96, 165, 250, 0.15); color: var(--accent-blue); }
        .stat-icon.green { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .stat-icon.purple { background: rgba(139, 92, 246, 0.15); color: #8b5cf6; }
        .stat-icon.amber { background: rgba(245, 158, 11, 0.15); color: var(--warning); }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Two-column grid */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Chart container */
        .chart-container {
            position: relative;
            height: 280px;
            margin-top: 10px;
        }

        /* Recent RFQ items */
        .rfq-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--glass-bg-light);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-bottom: 8px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .rfq-item:hover {
            border-color: var(--glass-border-hover);
            background: var(--pill-hover);
        }

        .rfq-item-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .rfq-item-id {
            font-weight: 600;
            font-size: 14px;
        }

        .rfq-item-dept {
            font-size: 12px;
            color: var(--text-muted);
        }

        .rfq-item-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .rfq-item-date {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .badge-info { background: rgba(59, 130, 246, 0.15); color: var(--info); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* Spinner */
        .spinner-border {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 3px solid var(--glass-border);
            border-right-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .grid-2 { grid-template-columns: 1fr; }
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .nav-center { display: none; }
        }
    </style>
</head>
<body>
    <div class="background-layer"></div>
    <div class="background-overlay"></div>

    <div class="page">
        <!-- Top Navigation -->
        <div class="top-nav">
            <div class="nav-left">
                <div class="brand">
                    <div class="brand-icon">F</div>
                    <span class="brand-name">FAITE Admin</span>
                </div>
                <div class="nav-center">
                    <i class="bi bi-speedometer2"></i> Dashboard Overview
                </div>
            </div>
            <div class="nav-right">
                <a href="{{ url_for('admin.rfq_list') }}" class="nav-btn">
                    <i class="bi bi-list-ul"></i> RFQs
                </a>
                <a href="{{ url_for('admin.bids_list') }}" class="nav-btn">
                    <i class="bi bi-truck"></i> Bids
                </a>
                <a href="{{ url_for('admin.logout') }}" class="nav-btn">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
                <button class="theme-toggle-btn" onclick="toggleTheme()">
                    <i class="bi bi-sun-fill" id="light-icon" style="display: none;"></i>
                    <i class="bi bi-moon-fill" id="dark-icon"></i>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="container">
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="bi bi-file-earmark-text"></i></div>
                    <div class="stat-value" id="total-rfqs">-</div>
                    <div class="stat-label">Total RFQs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><i class="bi bi-building"></i></div>
                    <div class="stat-value" id="total-suppliers">-</div>
                    <div class="stat-label">Total Suppliers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon purple"><i class="bi bi-receipt"></i></div>
                    <div class="stat-value" id="total-bids">-</div>
                    <div class="stat-label">Total Bids</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon amber"><i class="bi bi-cash-stack"></i></div>
                    <div class="stat-value" id="avg-bid">-</div>
                    <div class="stat-label">Avg Bid Amount</div>
                </div>
            </div>

            <!-- Charts & Recent RFQs -->
            <div class="grid-2">
                <!-- Status Chart -->
                <div class="glass-card">
                    <div class="card-title">
                        <span><i class="bi bi-pie-chart"></i> RFQs by Status</span>
                    </div>
                    <div class="chart-container">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>

                <!-- Recent RFQs -->
                <div class="glass-card">
                    <div class="card-title">
                        <span><i class="bi bi-clock-history"></i> Recent RFQs</span>
                    </div>
                    <div id="recent-rfqs">
                        <div class="empty-state">
                            <div class="spinner-border" role="status"></div>
                            <p style="margin-top: 12px;">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);

            document.getElementById('light-icon').style.display = newTheme === 'light' ? 'inline' : 'none';
            document.getElementById('dark-icon').style.display = newTheme === 'dark' ? 'inline' : 'none';

            // Update chart colors
            if (window.statusChartInstance) {
                updateChartTheme();
            }
        }

        function updateChartTheme() {
            if (!window.statusChartInstance) return;
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            window.statusChartInstance.options.plugins.legend.labels.color = isDark ? '#f8fafc' : '#1e293b';
            window.statusChartInstance.update();
        }

        async function loadDashboardStats() {
            try {
                const response = await fetch('/RFX/admin/api/dashboard/stats');
                const data = await response.json();

                if (data.status === 'success') {
                    const stats = data.statistics;

                    // Update cards
                    document.getElementById('total-rfqs').textContent = stats.total_rfqs || 0;
                    document.getElementById('total-suppliers').textContent = stats.total_suppliers || 0;
                    document.getElementById('total-bids').textContent = stats.total_bids || 0;
                    document.getElementById('avg-bid').textContent =
                        `$${stats.avg_bid_amount?.toLocaleString() || 0}`;

                    // Update status chart
                    updateStatusChart(stats.rfqs_by_status);

                    // Update recent RFQs
                    updateRecentRFQs(stats.recent_rfqs);
                }
            } catch (error) {
                console.error('Error loading dashboard stats:', error);
            }
        }

        function updateStatusChart(statusData) {
            const ctx = document.getElementById('statusChart').getContext('2d');
            const labels = Object.keys(statusData);
            const values = Object.values(statusData);
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

            const chartColors = [
                'rgba(59, 130, 246, 0.8)',   // blue
                'rgba(16, 185, 129, 0.8)',   // green
                'rgba(245, 158, 11, 0.8)',   // amber
                'rgba(139, 92, 246, 0.8)',   // purple
                'rgba(239, 68, 68, 0.8)',    // red
                'rgba(236, 72, 153, 0.8)',   // pink
                'rgba(20, 184, 166, 0.8)'    // teal
            ];

            const borderColors = chartColors.map(c => c.replace('0.8', '1'));

            window.statusChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: chartColors.slice(0, labels.length),
                        borderColor: borderColors.slice(0, labels.length),
                        borderWidth: 2,
                        hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '55%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: isDark ? '#f8fafc' : '#1e293b',
                                padding: 16,
                                usePointStyle: true,
                                pointStyle: 'circle',
                                font: { family: "'Outfit', sans-serif", size: 12 }
                            }
                        }
                    }
                }
            });
        }

        function updateRecentRFQs(recent) {
            const container = document.getElementById('recent-rfqs');
            if (!recent || recent.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>No recent RFQs</p>
                    </div>`;
                return;
            }

            container.innerHTML = recent.map(rfq => {
                const statusClass =
                    rfq.status === 'DRAFT' ? 'badge-warning' :
                    rfq.status === 'CONFIRMED' || rfq.status === 'PUBLISHED' ? 'badge-info' :
                    rfq.status === 'PROCESSING' ? 'badge-warning' :
                    rfq.status === 'AWARDED' ? 'badge-success' :
                    rfq.status === 'CANCELLED' ? 'badge-danger' : 'badge-info';

                return `
                    <a href="/RFX/admin/rfq/${rfq.rfq_id}" class="rfq-item">
                        <div class="rfq-item-left">
                            <span class="rfq-item-id">${rfq.rfq_id}</span>
                            <span class="rfq-item-dept">Department: ${rfq.department || 'N/A'} · Suppliers: ${rfq.supplier_count}</span>
                        </div>
                        <div class="rfq-item-right">
                            <span class="rfq-item-date">${rfq.created_at || ''}</span>
                            <span class="badge ${statusClass}">${rfq.status}</span>
                        </div>
                    </a>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', loadDashboardStats);
    </script>
</body>
</html>
