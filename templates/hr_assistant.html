<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Policy Document Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .upload-section {
            padding: 40px;
            border-bottom: 1px solid #eee;
        }

        .upload-area {
            border: 3px dashed #3498db;
            border-radius: 10px;
            padding: 60px 20px;
            text-align: center;
            background: #f8f9fa;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            background: #e3f2fd;
            border-color: #2980b9;
        }

        .upload-area.dragover {
            background: #d4edda;
            border-color: #28a745;
        }

        .upload-icon {
            font-size: 4em;
            color: #3498db;
            margin-bottom: 20px;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60 0%, #219653 100%);
        }

        .file-list {
            margin-top: 20px;
            text-align: left;
        }

        .file-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-name {
            flex-grow: 1;
            font-weight: bold;
        }

        .file-size {
            color: #7f8c8d;
            margin-right: 15px;
        }

        .remove-file {
            color: #e74c3c;
            cursor: pointer;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 3px;
        }

        .remove-file:hover {
            background: #e74c3c;
            color: white;
        }

        .results-section {
            padding: 40px;
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 4px solid #3498db;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-label {
            color: #7f8c8d;
            margin-top: 5px;
        }

        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .section-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            border-left: 4px solid;
        }

        .section-header {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .section-confidence {
            color: #7f8c8d;
            font-size: 0.9em;
        }

        .section-body {
            padding: 20px;
        }

        .section-detail {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .detail-label {
            font-weight: bold;
            color: #2c3e50;
        }

        .detail-value {
            color: #7f8c8d;
        }

        .confidence-bar {
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .processing {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        .success-message {
            background: #27ae60;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        .chunks-section {
            margin-top: 30px;
        }

        .chunk-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }

        .chunk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .chunk-method {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .method-rule {
            background: #d4edda;
            color: #155724;
        }

        .method-llm {
            background: #cce7ff;
            color: #004085;
        }

        .method-fallback {
            background: #fff3cd;
            color: #856404;
        }

        .back-btn {
            background: #95a5a6;
            margin-bottom: 20px;
        }

        .confirmation-section {
            background: #e8f4fd;
            border: 2px solid #3498db;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 HR Policy Document Analyzer</h1>
            <p>Upload your HR documents to automatically detect and categorize policy sections</p>
        </div>

        <div class="upload-section" id="uploadSection">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <h2>Drag & Drop Files Here</h2>
                <p>or click to browse (PDF, DOCX, TXT, CSV)</p>
                <input type="file" id="fileInput" class="file-input" multiple accept=".pdf,.docx,.txt,.csv">
                <button class="btn" onclick="document.getElementById('fileInput').click()">Choose Files</button>
            </div>

            <div class="file-list" id="fileList"></div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" id="processBtn" onclick="processFiles()" disabled>Analyze Documents</button>
                <button class="btn btn-danger" onclick="clearFiles()">Clear All</button>
            </div>
        </div>

        <div class="processing" id="processingSection">
            <div class="spinner"></div>
            <h2>Analyzing Documents...</h2>
            <p>This may take a few moments depending on file size and complexity</p>
            <div id="progressText">Processing files...</div>
        </div>

        <div class="results-section" id="resultsSection">
            <button class="btn back-btn" onclick="showUploadSection()">← Upload More Files</button>
            <div id="resultsContent"></div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
    </div>

    <script>
        let selectedFiles = [];
        let currentProcessedData = null;

        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const processBtn = document.getElementById('processBtn');
        const uploadSection = document.getElementById('uploadSection');
        const processingSection = document.getElementById('processingSection');
        const resultsSection = document.getElementById('resultsSection');
        const resultsContent = document.getElementById('resultsContent');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // Event Listeners
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', handleDragOver);
        uploadArea.addEventListener('dragleave', handleDragLeave);
        uploadArea.addEventListener('drop', handleDrop);
        fileInput.addEventListener('change', handleFileSelect);

        function handleDragOver(e) {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            addFiles(files);
        }

        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            addFiles(files);
        }

        function addFiles(files) {
            const validFiles = files.filter(file => {
                const ext = file.name.toLowerCase().split('.').pop();
                return ['pdf', 'docx', 'txt', 'csv'].includes(ext);
            });

            if (validFiles.length === 0) {
                showError('Please select valid files (PDF, DOCX, TXT, CSV)');
                return;
            }

            validFiles.forEach(file => {
                if (!selectedFiles.find(f => f.name === file.name && f.size === file.size)) {
                    selectedFiles.push(file);
                }
            });

            updateFileList();
            updateProcessButton();
            showSuccess(`Added ${validFiles.length} file(s)`);
        }

        function updateFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div class="file-name">${file.name}</div>
                    <div class="file-size">${formatFileSize(file.size)}</div>
                    <div class="remove-file" onclick="removeFile(${index})">✕</div>
                `;
                fileList.appendChild(fileItem);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            updateProcessButton();
        }

        function clearFiles() {
            selectedFiles = [];
            updateFileList();
            updateProcessButton();
            fileInput.value = '';
        }

        function updateProcessButton() {
            processBtn.disabled = selectedFiles.length === 0;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function processFiles() {
        if (selectedFiles.length === 0) return;

        showProcessing();
        hideMessages();

        const formData = new FormData();
        selectedFiles.forEach(file => {
            formData.append('files', file);
        });

        try {
            console.log("DEBUG: Starting processing job");
            
            // Step 1: Start the processing job
            const startResponse = await fetch('/AskInno/hr/start_processing', {
                method: 'POST',
                body: formData
            });

            console.log("DEBUG: Start response status:", startResponse.status);
            const startResult = await startResponse.json();
            console.log("DEBUG: Start processing result:", startResult);

            if (!startResult.success) {
                throw new Error(startResult.error || 'Failed to start processing');
            }

            const jobId = startResult.job_id;
            console.log("DEBUG: Job started with ID:", jobId);

            // Step 2: Poll for progress and results
            await pollProgress(jobId);

        } catch (error) {
            console.error("DEBUG: Error in processFiles:", error);
            showError('Error processing files: ' + error.message);
            showUploadSection();
        }
    }

    async function pollProgress(jobId) {
        const maxAttempts = 30 * 60 * 1000; // 5 minutes at 1 second intervals
        const intervalMs = 3 * 60 * 1000;
        let attempts = 0;

        const poll = async () => {
            try {
                console.log(`DEBUG: Checking progress for job ${jobId}, attempt ${attempts + 1}`);
                
                const response = await fetch(`/AskInno/hr/check_progress/${jobId}`);
                const progressData = await response.json();
                
                console.log("DEBUG: Progress check result:", progressData);

                if (!progressData.success) {
                    throw new Error(progressData.error || 'Progress check failed');
                }

                // Update progress UI
                updateProgressUI(progressData);

                if (progressData.status === 'completed') {
                    console.log("DEBUG: Processing completed, showing results");
                    currentProcessedData = progressData.result;
                    showResults(progressData.result);
                    showSuccess(`Successfully processed ${progressData.result.total_files_processed} file(s)`);
                    return true;
                } else if (progressData.status === 'error') {
                    throw new Error(progressData.error || 'Processing failed');
                }

                // Continue polling if not completed
                attempts++;
                if (attempts >= maxAttempts) {
                    throw new Error('Processing timeout - took too long');
                }
                
                setTimeout(poll, intervalMs);
                return false;

            } catch (error) {
                console.error("DEBUG: Error in pollProgress:", error);
                showError('Error during processing: ' + error.message);
                showUploadSection();
                return true; // Stop polling
            }
        };

        // Start polling
        await poll();
    }

    function updateProgressUI(progressData) {
        const progressText = document.getElementById('progressText');
        
        if (progressText) {
            let progressHtml = `
                <div style="margin: 20px 0;">
                    <div style="font-weight: bold; margin-bottom: 10px;">${progressData.current_step || 'Processing...'}</div>
                    <div style="background: #ecf0f1; border-radius: 10px; height: 20px; margin: 10px 0;">
                        <div style="background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); 
                                    height: 100%; border-radius: 10px; width: ${progressData.progress || 0}%;
                                    transition: width 0.3s ease; text-align: center; color: white; font-size: 12px; line-height: 20px;">
                            ${Math.round(progressData.progress || 0)}%
                        </div>
                    </div>
                    <div style="font-size: 0.9em; color: #7f8c8d;">
                        Files: ${progressData.processed_files || 0}/${progressData.total_files || 0} • 
                        Pages: ${progressData.processed_pages || 0}/${progressData.total_pages || 0}
                    </div>
                </div>
            `;
            progressText.innerHTML = progressHtml;
        }
    }

        async function saveToDatabase(filesToSave = [], updateExisting = true, similarityThreshold = 0.85) {
            try {
                showProcessing();
                
                const saveData = {
                    files_to_save: filesToSave,
                    update_existing: updateExisting,
                    similarity_threshold: similarityThreshold
                };

                console.log("DEBUG: Saving to database with data:", saveData);
                
                const response = await fetch('/AskInno/hr/confirm_and_save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(saveData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                console.log("DEBUG: Save result:", result);

                if (result.success) {
                    showSuccess(`Successfully saved ${result.summary.total_saved} documents to database!`);
                    
                    // Show detailed results
                    let resultsHtml = `
                        <div style="background: #d4edda; color: #155724; padding: 20px; border-radius: 8px; margin: 20px 0;">
                            <h3>✅ Save Complete</h3>
                            <p><strong>Documents saved:</strong> ${result.summary.total_saved}</p>
                            <p><strong>Chunks created:</strong> ${result.summary.total_chunks_created}</p>
                            <p><strong>Chunks skipped:</strong> ${result.summary.total_chunks_skipped}</p>
                    `;
                    
                    if (result.upload_results) {
                        resultsHtml += `<h4>File Details:</h4><ul>`;
                        result.upload_results.forEach(fileResult => {
                            if (fileResult.success) {
                                resultsHtml += `<li>${fileResult.filename}: ${fileResult.chunks_created} chunks created, ${fileResult.chunks_skipped} skipped</li>`;
                            } else {
                                resultsHtml += `<li>${fileResult.filename}: ❌ Failed - ${fileResult.error}</li>`;
                            }
                        });
                        resultsHtml += `</ul>`;
                    }
                    
                    resultsHtml += `</div>`;
                    
                    // Insert results at the top of the results section
                    const resultsContent = document.getElementById('resultsContent');
                    resultsContent.innerHTML = resultsHtml + resultsContent.innerHTML;
                    
                } else {
                    throw new Error(result.error || 'Save failed');
                }
                
            } catch (error) {
                console.error("DEBUG: Error saving to database:", error);
                showError('Error saving to database: ' + error.message);
            } finally {
                // Don't go back to upload section - stay on results
                processingSection.style.display = 'none';
                resultsSection.style.display = 'block';
            }
        }

        // Update your existing saveToDatabase function to use the new one
        async function confirmAndSave() {
            // You can add a confirmation dialog here
            const confirmed = confirm("Are you sure you want to save these documents to the database?");
            if (confirmed) {
                await saveToDatabase(); // Save all files
            }
        }

        function showProcessing() {
            uploadSection.style.display = 'none';
            resultsSection.style.display = 'none';
            processingSection.style.display = 'block';
        }

        function showUploadSection() {
            uploadSection.style.display = 'block';
            resultsSection.style.display = 'none';
            processingSection.style.display = 'none';
            hideMessages();
            clearFiles();
        }

        function showResults(data) {
            console.log("DEBUG: showResults called with data:", data);
            
            uploadSection.style.display = 'none';
            processingSection.style.display = 'none';
            resultsSection.style.display = 'block';

            let html = '';

            // Add confirmation section if required
            if (data.requires_confirmation) {
                html += `
                    <div class="confirmation-section">
                        <h3>✅ Analysis Complete!</h3>
                        <p>Documents have been processed successfully. Review the results below and confirm to save to database.</p>
                        <div class="action-buttons">
                            <button class="btn btn-success" onclick="confirmAndSave()">✅ Confirm & Save to Database</button>
                            <button class="btn btn-danger" onclick="showUploadSection()">❌ Cancel</button>
                        </div>
                    </div>
                `;
            }

            // Check if processed_files exists and is an array
            if (!data.processed_files || !Array.isArray(data.processed_files)) {
                console.error("DEBUG: processed_files is missing or not an array:", data.processed_files);
                html += `<div style="background: #f8d7da; color: #721c24; padding: 20px; border-radius: 8px;">
                        <h3>❌ Data Format Error</h3>
                        <p>Expected 'processed_files' array but got: ${typeof data.processed_files}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>`;
                resultsContent.innerHTML = html;
                return;
            }

            data.processed_files.forEach((file, fileIndex) => {
                console.log(`DEBUG: Processing file ${fileIndex}:`, file);
                
                if (file.error) {
                    html += `
                        <div style="background: #f8d7da; color: #721c24; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                            <h3>❌ ${file.filename}</h3>
                            <p>Error: ${file.error}</p>
                        </div>
                    `;
                    return;
                }

                // Check if required fields exist
                if (!file.sections_detected || typeof file.sections_detected !== 'object') {
                    console.warn(`DEBUG: File ${file.filename} missing sections_detected:`, file);
                    html += `
                        <div style="background: #fff3cd; color: #856404; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                            <h3>⚠️ ${file.filename}</h3>
                            <p>No sections detected or invalid data format</p>
                        </div>
                    `;
                    return;
                }

                html += `
                    <div style="background: white; border-radius: 10px; padding: 30px; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                        <h2 style="color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px;">
                            📄 ${file.filename}
                        </h2>

                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-number">${file.total_chunks || 0}</div>
                                <div class="stat-label">Total Chunks</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${file.total_pages || 0}</div>
                                <div class="stat-label">Total Pages</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${Object.keys(file.sections_detected).length}</div>
                                <div class="stat-label">Sections Found</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-number">${file.processing_stats?.llm_calls || 0}</div>
                                <div class="stat-label">LLM Calls</div>
                            </div>
                        </div>

                        <h3 style="color: #2c3e50; margin: 30px 0 20px 0;">Detected Policy Sections</h3>
                        <div class="sections-grid">
                `;

                Object.entries(file.sections_detected).forEach(([sectionName, sectionData]) => {
                    const confidencePercent = Math.round((sectionData.average_confidence || 0) * 100);
                    const confidenceColor = confidencePercent >= 80 ? '#27ae60' : 
                                        confidencePercent >= 60 ? '#f39c12' : '#e74c3c';

                    html += `
                        <div class="section-card">
                            <div class="section-header">
                                <div class="section-title">${sectionName}</div>
                                <div class="section-confidence">${confidencePercent}% Confidence</div>
                            </div>
                            <div class="section-body">
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${confidencePercent}%; background: ${confidenceColor};"></div>
                                </div>
                                <div class="section-detail">
                                    <span class="detail-label">Chunks:</span>
                                    <span class="detail-value">${sectionData.chunk_count || 0}</span>
                                </div>
                                <div class="section-detail">
                                    <span class="detail-label">Pages:</span>
                                    <span class="detail-value">${(sectionData.pages || []).join(', ')}</span>
                                </div>
                                <div class="section-detail">
                                    <span class="detail-label">Methods:</span>
                                    <span class="detail-value">${(sectionData.detection_methods || []).join(', ')}</span>
                                </div>
                                ${(sectionData.sample_texts && sectionData.sample_texts.length > 0) ? `
                                    <div style="margin-top: 15px;">
                                        <div style="font-weight: bold; color: #2c3e50; margin-bottom: 5px;">Sample Text:</div>
                                        <div style="font-size: 0.9em; color: #7f8c8d; font-style: italic;">
                                            "${sectionData.sample_texts[0]}"
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                `;

                // Show raw chunks if they exist
                if (file.raw_chunks && Array.isArray(file.raw_chunks) && file.raw_chunks.length > 0) {
                    html += `
                        <div class="chunks-section">
                            <h3 style="color: #2c3e50; margin: 30px 0 20px 0;">Detailed Chunks</h3>
                    `;

                    file.raw_chunks.forEach((chunk, chunkIndex) => {
                        const methodClass = chunk.detection_method ? 
                            `method-${chunk.detection_method.toLowerCase().replace('_', '-')}` : 
                            'method-fallback';
                        
                        html += `
                            <div class="chunk-item">
                                <div class="chunk-header">
                                    <strong>Chunk ${chunkIndex + 1}</strong>
                                    <span class="chunk-method ${methodClass}">${chunk.detection_method || 'unknown'}</span>
                                </div>
                                <div style="color: #7f8c8d; font-size: 0.9em; margin-bottom: 10px;">
                                    Page ${chunk.page_number || 'N/A'} • Confidence: ${Math.round((chunk.confidence || 0) * 100)}%
                                </div>
                                <div style="color: #2c3e50;">
                                    ${(chunk.text || '').substring(0, 200)}${(chunk.text || '').length > 200 ? '...' : ''}
                                </div>
                            </div>
                        `;
                    });

                    html += `
                        </div>
                    `;
                }

                html += `
                    </div>
                `;
            });

            console.log("DEBUG: Generated HTML length:", html.length);
            resultsContent.innerHTML = html;
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 5000);
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }
    </script>
</body>
</html>
