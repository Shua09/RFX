<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - FAITE RFQ Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════════
           THEME VARIABLES - DARK MODE (DEFAULT)
           ═══════════════════════════════════════════════════════════════ */
        :root {
            --glass-bg: rgba(15, 23, 42, 0.9);
            --glass-bg-light: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-hover: rgba(255, 255, 255, 0.18);
            --text-primary: #f8fafc;
            --text-secondary: rgba(248, 250, 252, 0.75);
            --text-muted: rgba(248, 250, 252, 0.55);
            --accent-gradient: linear-gradient(135deg, #0f2a5e 0%, #1e4d8c 50%, #60a5fa 100%);
            --accent-blue: #60a5fa;
            --accent-purple: #3b82f6;
            --error-gradient: linear-gradient(135deg, #991b1b 0%, #b91c1c 50%, #ef4444 100%);
            --pill-bg: rgba(255, 255, 255, 0.08);
            --pill-hover: rgba(255, 255, 255, 0.14);
            --blur-amount: 20px;
            --body-bg: #0f172a;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --error-box-bg: rgba(239, 68, 68, 0.1);
            --error-box-border: rgba(239, 68, 68, 0.3);
            --error-box-text: #fecaca;
        }

        /* ═══════════════════════════════════════════════════════════════
           THEME VARIABLES - LIGHT MODE
           ═══════════════════════════════════════════════════════════════ */
        [data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-bg-light: rgba(248, 250, 252, 0.9);
            --glass-border: rgba(0, 0, 0, 0.1);
            --glass-border-hover: rgba(0, 0, 0, 0.18);
            --text-primary: #1e293b;
            --text-secondary: rgba(30, 41, 59, 0.8);
            --text-muted: rgba(30, 41, 59, 0.55);
            --pill-bg: rgba(0, 0, 0, 0.05);
            --pill-hover: rgba(0, 0, 0, 0.1);
            --body-bg: #f1f5f9;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --error-box-bg: rgba(239, 68, 68, 0.06);
            --error-box-border: rgba(239, 68, 68, 0.2);
            --error-box-text: #991b1b;
        }

        [data-theme="light"] .background-layer { filter: brightness(1.1) saturate(0.9); }
        [data-theme="light"] .background-overlay {
            background: linear-gradient(180deg, rgba(241,245,249,0.7) 0%, rgba(241,245,249,0.85) 50%, rgba(241,245,249,0.95) 100%);
        }

        [data-theme="light"] .error-icon {
            background: linear-gradient(135deg, #b91c1c 0%, #dc2626 50%, #ef4444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        [data-theme="light"] h1 {
            background: linear-gradient(135deg, #b91c1c 0%, #dc2626 50%, #ef4444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--body-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.in-iframe { background: transparent; }
        body.in-iframe .background-layer,
        body.in-iframe .background-overlay { display: none; }

        .background-layer {
            position: fixed; inset: 0; z-index: 0;
            background: url('{{ url_for("static", filename="images/faite-bg-v2.png") }}') center/cover no-repeat;
            filter: brightness(0.5) saturate(1.1);
        }

        .background-overlay {
            position: fixed; inset: 0; z-index: 1;
            background: linear-gradient(180deg, rgba(15,23,42,0.7) 0%, rgba(15,23,42,0.85) 50%, rgba(15,23,42,0.92) 100%);
        }

        .error-card {
            position: relative; z-index: 2;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px var(--shadow-color);
            text-align: center;
            animation: cardFadeIn 0.5s ease forwards;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
            background: var(--error-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 16px;
            background: var(--error-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .error-message {
            background: var(--error-box-bg);
            border: 1px solid var(--error-box-border);
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            color: var(--error-box-text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            text-align: left;
            word-break: break-word;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: var(--accent-gradient);
        }

        .btn-primary:hover {
            box-shadow: 0 10px 25px -5px rgba(96, 165, 250, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #334155 0%, #475569 50%, #64748b 100%);
        }

        .btn-secondary:hover {
            box-shadow: 0 10px 25px -5px rgba(100, 116, 139, 0.5);
        }

        /* Theme toggle */
        .theme-toggle { position: fixed; top: 16px; right: 16px; z-index: 10; }
        body.in-iframe .theme-toggle { display: none; }

        .theme-toggle-btn {
            width: 40px; height: 40px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            color: var(--text-primary);
            cursor: pointer; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s ease, border-color 0.2s ease;
            font-size: 18px;
        }

        .theme-toggle-btn:hover { background: var(--pill-hover); border-color: var(--glass-border-hover); }

        [data-theme="dark"] .theme-toggle-btn .sun-icon { display: none; }
        [data-theme="dark"] .theme-toggle-btn .moon-icon { display: block; }
        [data-theme="light"] .theme-toggle-btn .sun-icon { display: block; }
        [data-theme="light"] .theme-toggle-btn .moon-icon { display: none; }

        @media (max-width: 480px) {
            .error-card { padding: 28px 20px; }
            h1 { font-size: 24px; }
            .error-icon { font-size: 48px; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="background-layer"></div>
    <div class="background-overlay"></div>

    <div class="theme-toggle">
        <button class="theme-toggle-btn" type="button" onclick="toggleTheme()" title="Toggle Theme">
            <span class="sun-icon">☀️</span>
            <span class="moon-icon">🌙</span>
        </button>
    </div>

    <div class="error-card">
        <div class="error-icon">⚠️</div>
        <h1>Something Went Wrong</h1>
        
        <div class="error-message">
            {{ error }}
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="window.location.reload()">Try Again</button>
            <button class="btn btn-secondary" onclick="window.close()">Close</button>
        </div>
    </div>

    <script>
        if (window !== window.parent) { document.body.classList.add('in-iframe'); }

        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
        }

        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'theme-change') {
                document.documentElement.setAttribute('data-theme', e.data.theme);
            }
        });

        function notifyHeight() {
            if (window !== window.parent) {
                window.parent.postMessage({ type: 'iframe-height', height: document.documentElement.scrollHeight }, '*');
            }
        }
        window.addEventListener('load', notifyHeight);
        window.addEventListener('resize', notifyHeight);
    </script>
</body>
</html>
