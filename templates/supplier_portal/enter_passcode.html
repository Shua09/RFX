<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Passcode - FAITE RFQ Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════════
           THEME VARIABLES - DARK MODE (DEFAULT)
           ═══════════════════════════════════════════════════════════════ */
        :root {
            --glass-bg: rgba(15, 23, 42, 0.9);
            --glass-bg-light: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-hover: rgba(255, 255, 255, 0.18);
            --text-primary: #f8fafc;
            --text-secondary: rgba(248, 250, 252, 0.75);
            --text-muted: rgba(248, 250, 252, 0.55);
            --accent-gradient: linear-gradient(135deg, #0f2a5e 0%, #1e4d8c 50%, #60a5fa 100%);
            --accent-blue: #60a5fa;
            --accent-purple: #3b82f6;
            --pill-bg: rgba(255, 255, 255, 0.08);
            --pill-hover: rgba(255, 255, 255, 0.14);
            --input-bg: rgba(0, 0, 0, 0.3);
            --blur-amount: 20px;
            --body-bg: #0f172a;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        /* ═══════════════════════════════════════════════════════════════
           THEME VARIABLES - LIGHT MODE
           ═══════════════════════════════════════════════════════════════ */
        [data-theme="light"] {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-bg-light: rgba(248, 250, 252, 0.9);
            --glass-border: rgba(0, 0, 0, 0.1);
            --glass-border-hover: rgba(0, 0, 0, 0.18);
            --text-primary: #1e293b;
            --text-secondary: rgba(30, 41, 59, 0.8);
            --text-muted: rgba(30, 41, 59, 0.55);
            --pill-bg: rgba(0, 0, 0, 0.05);
            --pill-hover: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(0, 0, 0, 0.04);
            --body-bg: #f1f5f9;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        [data-theme="light"] .background-layer { filter: brightness(1.1) saturate(0.9); }
        [data-theme="light"] .background-overlay {
            background: linear-gradient(180deg, rgba(241,245,249,0.7) 0%, rgba(241,245,249,0.85) 50%, rgba(241,245,249,0.95) 100%);
        }

        [data-theme="light"] .lock-icon {
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        [data-theme="light"] .passcode-input {
            border-color: rgba(0, 0, 0, 0.15);
        }
        [data-theme="light"] .passcode-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        [data-theme="light"] .passcode-input::placeholder {
            color: var(--text-muted);
        }

        [data-theme="light"] .rfq-id {
            background: rgba(59, 130, 246, 0.08);
            color: #2563eb;
        }

        [data-theme="light"] .error-message {
            background: rgba(239, 68, 68, 0.08);
            color: #b91c1c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--body-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.in-iframe { background: transparent; }
        body.in-iframe .background-layer,
        body.in-iframe .background-overlay { display: none; }

        .background-layer {
            position: fixed; inset: 0; z-index: 0;
            background: url('{{ url_for("static", filename="images/faite-bg-v2.png") }}') center/cover no-repeat;
            filter: brightness(0.5) saturate(1.1);
        }

        .background-overlay {
            position: fixed; inset: 0; z-index: 1;
            background: linear-gradient(180deg, rgba(15,23,42,0.7) 0%, rgba(15,23,42,0.85) 50%, rgba(15,23,42,0.92) 100%);
        }

        .passcode-card {
            position: relative; z-index: 2;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px var(--shadow-color);
            text-align: center;
            animation: cardFadeIn 0.5s ease forwards;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lock-icon {
            font-size: 48px;
            margin-bottom: 20px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .company-name {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .rfq-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 24px;
        }

        .passcode-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 24px;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            letter-spacing: 8px;
            background: var(--input-bg);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            outline: none;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .passcode-input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }

        .passcode-input::placeholder {
            letter-spacing: normal;
            font-size: 16px;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 16px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(96, 165, 250, 0.5);
        }

        .btn:active:not(:disabled) { transform: translateY(0); }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 12px;
            display: none;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .info-text {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            line-height: 1.5;
        }

        .info-text .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
        }

        .loading {
            display: none;
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--glass-border);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Theme toggle */
        .theme-toggle { position: fixed; top: 16px; right: 16px; z-index: 10; }
        body.in-iframe .theme-toggle { display: none; }

        .theme-toggle-btn {
            width: 40px; height: 40px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            color: var(--text-primary);
            cursor: pointer; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s ease, border-color 0.2s ease;
            font-size: 18px;
        }

        .theme-toggle-btn:hover { background: var(--pill-hover); border-color: var(--glass-border-hover); }

        [data-theme="dark"] .theme-toggle-btn .sun-icon { display: none; }
        [data-theme="dark"] .theme-toggle-btn .moon-icon { display: block; }
        [data-theme="light"] .theme-toggle-btn .sun-icon { display: block; }
        [data-theme="light"] .theme-toggle-btn .moon-icon { display: none; }

        @media (max-width: 480px) {
            .passcode-card { padding: 28px 20px; }
            h1 { font-size: 24px; }
            .passcode-input { font-size: 20px; letter-spacing: 6px; padding: 14px 16px; }
        }
    </style>
</head>
<body>
    <div class="background-layer"></div>
    <div class="background-overlay"></div>

    <div class="theme-toggle">
        <button class="theme-toggle-btn" type="button" onclick="toggleTheme()" title="Toggle Theme">
            <span class="sun-icon">☀️</span>
            <span class="moon-icon">🌙</span>
        </button>
    </div>

    <div class="passcode-card">
        <div class="lock-icon">🔐</div>
        <h1>Enter Passcode</h1>
        <div class="company-name">{{ company_name }}</div>
        <div class="rfq-id">{{ rfq_id }}</div>

        <input type="text" 
               class="passcode-input" 
               id="passcode" 
               placeholder="RFQ-XXXX-XXXX"
               maxlength="13"
               autocomplete="off">

        <button class="btn" id="submitBtn" onclick="validatePasscode()">
            Access Bid Form
        </button>

        <div class="error-message" id="errorMessage"></div>
        <div class="loading" id="loading">
            <div class="loading-spinner"></div> Validating...
        </div>

        <div class="info-text">
            <p>Enter the passcode that was sent to your email.</p>
            <p style="margin-top: 8px;" class="mono">Format: RFQ-XXXX-XXXX</p>
        </div>
    </div>

    <script>
        // Iframe detection
        if (window !== window.parent) { document.body.classList.add('in-iframe'); }

        // Theme
        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
        }

        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'theme-change') {
                document.documentElement.setAttribute('data-theme', e.data.theme);
            }
        });

        function notifyHeight() {
            if (window !== window.parent) {
                window.parent.postMessage({ type: 'iframe-height', height: document.documentElement.scrollHeight }, '*');
            }
        }
        window.addEventListener('load', notifyHeight);
        window.addEventListener('resize', notifyHeight);

        const passcodeInput = document.getElementById('passcode');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');

        // Auto-format passcode as user types
        passcodeInput.addEventListener('input', function(e) {
            let value = e.target.value.toUpperCase();
            // Remove any non-alphanumeric characters except hyphens
            value = value.replace(/[^A-Z0-9-]/g, '');
            
            // Auto-add hyphen after first 4 characters after RFQ-
            if (value.length === 8 && !value.includes('-')) {
                value = value.slice(0, 4) + '-' + value.slice(4);
            }
            
            e.target.value = value;
        });

        // Allow Enter key to submit
        passcodeInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                validatePasscode();
            }
        });

        async function validatePasscode() {
            const passcode = passcodeInput.value.trim();
            
            // Basic validation
            if (!passcode) {
                showError('Please enter your passcode');
                return;
            }

            // Validate format: RFQ-XXXX-XXXX where X can be letters or numbers
            if (!passcode.match(/^RFQ-[A-Z0-9]{4}-[A-Z0-9]{4}$/)) {
                showError('Invalid passcode format. Expected: RFQ-XXXX-XXXX');
                return;
            }

            // Disable input while validating
            setLoading(true);
            
            try {
                const response = await fetch('/RFX/supplier/validate-passcode', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ passcode: passcode })
                });

                const data = await response.json();

                if (data.valid) {
                    // Successful validation - redirect to bid form
                    window.location.href = data.redirect_url;
                } else {
                    showError(data.error || 'Invalid passcode. Please try again.');
                    setLoading(false);
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please try again.');
                setLoading(false);
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            passcodeInput.focus();
            passcodeInput.select();
            notifyHeight();
        }

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                passcodeInput.disabled = true;
                loading.style.display = 'block';
                errorMessage.style.display = 'none';
            } else {
                submitBtn.disabled = false;
                passcodeInput.disabled = false;
                loading.style.display = 'none';
            }
            notifyHeight();
        }

        // Focus input on page load
        document.addEventListener('DOMContentLoaded', function() {
            passcodeInput.focus();
        });
    </script>
</body>
</html>
